  <!-- Chunk Load Error Handler -->
  <script>
    window.addEventListener('error', function(e) {
      const msg = e.message || '';
      const isChunkError = msg.includes('Loading chunk') || 
                           msg.includes('Unexpected EOF') ||
                           msg.includes('SyntaxError');
      
      const target = e.target || {};
      const isScriptError = target.tagName === 'SCRIPT' || target.tagName === 'LINK';
      const url = target.src || target.href || '';
      
      if (isChunkError || (isScriptError && (url.includes('assets/') || url.includes('index-')))) {
        console.error('📦 Critical load error detected:', url || e.message);
        
        const lastReload = localStorage.getItem('pixel_last_reload');
        const now = Date.now();
        
        // Reload if last reload was more than 10s ago
        if (!lastReload || (now - parseInt(lastReload)) > 10000) {
          localStorage.setItem('pixel_last_reload', now.toString());

          // Nuclear option: Unregister all service workers then reload
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              for(let registration of registrations) {
                registration.unregister();
              }
              // Force reload with cache busting
              const retryUrl = new URL(window.location.href);
              retryUrl.searchParams.set('v', now.toString());
              window.location.replace(retryUrl.toString());
            });
          } else {
             const retryUrl = new URL(window.location.href);
             retryUrl.searchParams.set('v', now.toString());
             window.location.replace(retryUrl.toString());
          }
        }
      }
    }, true);

    // Also catch unhandled rejections (often where ChunkLoadErrors end up)
    window.addEventListener('unhandledrejection', function(event) {
      if (event.reason && event.reason.name === 'ChunkLoadError') {
        window.location.reload();
      }
    });
  </script>
