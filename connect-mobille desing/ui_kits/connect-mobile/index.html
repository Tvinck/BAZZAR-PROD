<!-- @startingPoint section="Connect Mobile App" subtitle="Full interactive app shell — 4 tabs + notifications" viewport="390x844" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Connect Mobile — UI Kit</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/lucide@0.462.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { height: 100%; }
  body { display: flex; align-items: center; justify-content: center; background: #0d0d0f; }
  .phone { width: 390px; height: 844px; max-height: 96vh; background: var(--bg); border-radius: 28px; overflow: hidden; position: relative; border: 1px solid var(--hair-strong); }
  .phone ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const DS = window.ConnectMobileDesignSystem_60c434;
const { HomeScreen, ServicesHRScreen, ChatScreen, MoreScreen, NotificationsScreen, UsefulServicesScreen, ClientLineScreen, NewsScreen, OrdersScreen, FinancesScreen, ComingSoonScreen, LoginScreen, WelcomeScreen, TabBar } = DS;

function StatusBar() {
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px 24px 0', fontSize: 15, fontWeight: 600, fontFamily: 'var(--font-sans)' }}>
      <span>07:21</span>
      <span style={{ display: 'flex', gap: 6, alignItems: 'center', color: 'var(--text)' }}>
        <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1" opacity="0.35"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><path d="M8 9.5a1.5 1.5 0 100 3 1.5 1.5 0 000-3zM4.9 7.6l1.4 1.4a2.5 2.5 0 013.4 0l1.4-1.4a4.5 4.5 0 00-6.2 0zM2 4.7l1.4 1.4a6.5 6.5 0 019.2 0L14 4.7a8.5 8.5 0 00-12 0z"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="currentColor" opacity="0.4"/><rect x="2" y="2" width="15" height="8" rx="1.5" fill="currentColor"/><path d="M23 4v4a2 2 0 000-4z" fill="currentColor" opacity="0.4"/></svg>
      </span>
    </div>
  );
}

function App() {
  const [auth, setAuth] = React.useState('login'); // 'login' | 'welcome' | 'app'
  const [user, setUser] = React.useState('');
  const [theme, setTheme] = React.useState('dark');
  const [tab, setTab] = React.useState('home');
  const [overlay, setOverlay] = React.useState(null);
  const [project, setProject] = React.useState('BAZZAR SERTS');

  const tabs = [
    { key: 'home', label: 'Главная', icon: 'headphones' },
    { key: 'hr', label: 'Сервисы HR', icon: 'layout-grid' },
    { key: 'chat', label: 'Чат', icon: 'message-square', badge: 2 },
    { key: 'more', label: 'Ещё', icon: 'ellipsis' },
  ];

  let screen = null;
  const back = function () { setOverlay(null); };
  const open = function (k) { setOverlay(k); };
  if (overlay === 'notifications') {
    screen = <NotificationsScreen onBack={back} />;
  } else if (overlay === 'services') {
    screen = <UsefulServicesScreen onBack={back} onOpen={open} />;
  } else if (overlay === 'line') {
    screen = <ClientLineScreen onBack={back} />;
  } else if (overlay === 'news') {
    screen = <NewsScreen onBack={back} />;
  } else if (overlay === 'orders') {
    screen = <OrdersScreen onBack={back} />;
  } else if (overlay === 'finances') {
    screen = <FinancesScreen onBack={back} />;
  } else if (overlay && overlay.indexOf('coming:') === 0) {
    screen = <ComingSoonScreen title={overlay.slice(7)} onBack={back} />;
  } else if (tab === 'home') {
    screen = <HomeScreen project={project} onChangeProject={setProject} onOpenNotifications={function () { setOverlay('notifications'); }} onOpenServices={function () { setOverlay('services'); }} onStartLine={function () { setOverlay('line'); }} onOpen={open} />;
  } else if (tab === 'hr') {
    screen = <ServicesHRScreen onOpenNotifications={function () { setOverlay('notifications'); }} onOpen={open} />;
  } else if (tab === 'chat') {
    screen = <ChatScreen />;
  } else {
    screen = <MoreScreen onOpenNotifications={function () { setOverlay('notifications'); }} theme={theme} onThemeChange={setTheme} onLogout={function () { setAuth('login'); setTab('home'); setOverlay(null); }} />;
  }

  if (auth === 'login') {
    return (
      <div className="phone" data-theme={theme} data-screen-label="login" style={{ color: 'var(--text)' }}>
        <StatusBar />
        <div style={{ position: 'absolute', top: 40, bottom: 0, left: 0, right: 0 }}>
          <LoginScreen onLogin={function (email) { setUser(email); setAuth('welcome'); }} />
        </div>
      </div>
    );
  }
  if (auth === 'welcome') {
    return (
      <div className="phone" data-theme={theme} data-screen-label="welcome" style={{ color: 'var(--text)' }}>
        <StatusBar />
        <div style={{ position: 'absolute', top: 40, bottom: 0, left: 0, right: 0 }}>
          <WelcomeScreen name={user} onEnter={function () { setAuth('app'); }} />
        </div>
      </div>
    );
  }

  return (
    <div className="phone" data-theme={theme} data-screen-label={overlay || tab} style={{ color: 'var(--text)' }}>
      <StatusBar />
      <div style={{ position: 'absolute', top: 40, bottom: 0, left: 0, right: 0, overflowY: 'auto' }}>
        {screen}
      </div>
      {overlay ? null : (
        <TabBar items={tabs} active={tab} onChange={function (k) { setOverlay(null); setTab(k); }} />
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
