<!-- @dsCard group="Colors" viewport="700x150" name="Semantic" subtitle="Status colors — each with a 15% dim tint for fills" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
.row { display: flex; gap: 12px; padding: 16px; }
.pair { flex: 1; border-radius: 16px; overflow: hidden; border: 1px solid var(--hair); }
.top { height: 70px; }
.bot { height: 40px; display: flex; align-items: center; padding: 0 12px; font-size: 12px; font-weight: 600; }
</style></head>
<body>
<div class="row">
  <div class="pair"><div class="top" style="background: var(--green);"></div><div class="bot" style="background: var(--green-dim); color: #4cd964;">green #2fae5c</div></div>
  <div class="pair"><div class="top" style="background: var(--red);"></div><div class="bot" style="background: var(--red-dim); color: var(--red);">red #ff453a</div></div>
  <div class="pair"><div class="top" style="background: var(--amber);"></div><div class="bot" style="background: var(--amber-dim); color: var(--amber);">amber #ffd60a</div></div>
  <div class="pair"><div class="top" style="background: var(--violet);"></div><div class="bot" style="background: var(--violet-dim); color: var(--violet);">violet #bf5af2</div></div>
</div>
</body></html>
