<!-- @dsCard group="Spacing" viewport="700x150" name="Radii & spacing" subtitle="Large soft corners; 4px spacing grid" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
.wrap { display: flex; gap: 12px; padding: 16px; align-items: stretch; }
.r { background: var(--surface); border: 1px solid var(--hair-strong); display: flex; align-items: flex-end; padding: 10px; font-size: 11px; color: var(--text-3); font-family: ui-monospace, monospace; height: 110px; }
.sp { display: flex; align-items: flex-end; gap: 8px; background: var(--surface); border-radius: 16px; padding: 14px; height: 110px; flex: 1; }
.bar { background: var(--accent); border-radius: 3px; width: 22px; position: relative; }
.bar span { position: absolute; top: -16px; left: 0; font-size: 10px; color: var(--text-3); font-family: ui-monospace, monospace; }
</style></head>
<body>
<div class="wrap">
  <div class="r" style="border-radius: var(--radius-sm); width: 110px;">sm 10</div>
  <div class="r" style="border-radius: var(--radius); width: 110px;">md 16</div>
  <div class="r" style="border-radius: var(--radius-lg); width: 110px;">lg 24</div>
  <div class="sp">
    <div class="bar" style="height: 8px;"><span>4</span></div>
    <div class="bar" style="height: 14px;"><span>8</span></div>
    <div class="bar" style="height: 20px;"><span>12</span></div>
    <div class="bar" style="height: 26px;"><span>16</span></div>
    <div class="bar" style="height: 32px;"><span>20</span></div>
    <div class="bar" style="height: 38px;"><span>24</span></div>
    <div class="bar" style="height: 50px;"><span>32</span></div>
  </div>
</div>
</body></html>
