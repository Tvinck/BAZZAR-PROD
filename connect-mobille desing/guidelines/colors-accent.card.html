<!-- @dsCard group="Colors" viewport="700x150" name="Accent & CTA" subtitle="iOS blue for interaction, yellow for the primary CTA" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
.row { display: flex; gap: 12px; padding: 16px; }
.sw { flex: 1; height: 110px; border-radius: 16px; padding: 12px; display: flex; flex-direction: column; justify-content: flex-end; font-size: 12px; }
.sw code { font-size: 12px; }
</style></head>
<body>
<div class="row">
  <div class="sw" style="background: var(--accent); color: rgba(255,255,255,0.8);"><code style="color:#fff">--accent</code>#0a84ff</div>
  <div class="sw" style="background: var(--accent-dim); color: var(--accent);"><code style="color:var(--accent)">--accent-dim</code>15% tint</div>
  <div class="sw" style="background: var(--yellow); color: rgba(28,28,30,0.7);"><code style="color:var(--on-yellow)">--yellow</code>#ffdd2d</div>
  <div class="sw" style="background: var(--surface); color: var(--text-2);"><code style="color:var(--text)">--on-yellow</code>#1c1c1e</div>
</div>
</body></html>
