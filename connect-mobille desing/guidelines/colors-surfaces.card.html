<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces" subtitle="Black background + layered gray cards" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
.row { display: flex; gap: 12px; padding: 16px; }
.sw { flex: 1; height: 110px; border-radius: 16px; padding: 12px; display: flex; flex-direction: column; justify-content: flex-end; font-size: 12px; color: var(--text-2); border: 1px solid var(--hair); }
.sw code { color: var(--text); font-size: 12px; }
</style></head>
<body>
<div class="row">
  <div class="sw" style="background: var(--bg);"><code>--bg</code>#000000</div>
  <div class="sw" style="background: var(--surface);"><code>--surface</code>#1c1c1e</div>
  <div class="sw" style="background: var(--surface-2);"><code>--surface-2</code>#2c2c2e</div>
  <div class="sw" style="background: var(--surface-3);"><code>--surface-3</code>#3a3a3c</div>
</div>
</body></html>
