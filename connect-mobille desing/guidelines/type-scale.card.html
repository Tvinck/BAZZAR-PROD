<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
.list { padding: 20px 24px; display: flex; flex-direction: column; gap: 10px; }
.row { display: flex; align-items: baseline; gap: 16px; }
.meta { width: 190px; flex-shrink: 0; font-size: 12px; color: var(--text-3); font-family: ui-monospace, monospace; }
</style></head>
<body>
<div class="list">
  <div class="row"><span class="meta">--fs-large-title 34/700</span><span style="font-size: var(--fs-large-title); font-weight: 700;">Главная</span></div>
  <div class="row"><span class="meta">--fs-title 22/700</span><span style="font-size: var(--fs-title); font-weight: 700;">Полезные сервисы</span></div>
  <div class="row"><span class="meta">--fs-headline 17/600</span><span style="font-size: var(--fs-headline); font-weight: 600;">Начать разметку</span></div>
  <div class="row"><span class="meta">--fs-subhead 15/400</span><span style="font-size: var(--fs-subhead); color: var(--text-2);">Выполняйте задания и получайте вознаграждения</span></div>
  <div class="row"><span class="meta">--fs-footnote 13/400</span><span style="font-size: var(--fs-footnote); color: var(--text-3);">Новость • 2 июля • 14:30</span></div>
  <div class="row"><span class="meta">--fs-caption 11/500</span><span style="font-size: var(--fs-caption); font-weight: 500; color: var(--text-3);">ГЛАВНАЯ · СЕРВИСЫ HR · ЧАТ · ЕЩЁ</span></div>
</div>
</body></html>
